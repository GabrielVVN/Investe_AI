{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width: 600px; margin: auto;">
    <div class="card">
        <h2 class="text-center">Configurações</h2>
        <p class="text-center text-muted" style="margin-bottom: 2rem;">Ajuste a sua conta e defina a sua realidade financeira.</p>

        <form method="POST" action="{{ url_for('perfil') }}">
            
            <h4 style="color: var(--primary); margin-bottom: 1rem; border-bottom: 2px solid #f4f7fe; padding-bottom: 0.5rem;">🎯 A Sua Realidade</h4>
            
            <div class="form-group">
                <label>Qual é a sua Meta Final? (R$)</label>
                <input type="number" step="0.01" name="meta" value="{{ config.meta }}" required>
            </div>
            
            <div class="form-group">
                <label>Quando quer atingir essa meta?</label>
                <input type="date" name="data_alvo" value="{{ config.data_alvo.strftime('%Y-%m-%d') }}" required>
            </div>
            
            <div class="form-group">
                <label>Aporte Mensal Previsto (R$)</label>
                <input type="number" step="0.01" name="aporte_mensal" value="{{ config.aporte_mensal_planejado }}" required>
            </div>

            <h4 style="color: var(--primary); margin-bottom: 1rem; margin-top: 2rem; border-bottom: 2px solid #f4f7fe; padding-bottom: 0.5rem;">👤 Dados da Conta</h4>

            <div class="form-group">
                <label>Nome de Exibição</label>
                <input type="text" name="nome" value="{{ user.nome }}" required>
            </div>
            
            <div class="form-group">
                <label>Nova Senha <small style="font-weight: normal; color: var(--text-muted);">(Opcional)</small></label>
                <input type="password" name="senha" placeholder="Deixe em branco para não alterar">
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Salvar Tudo</button>
        </form>
    </div>
</div>
{% endblock %}
